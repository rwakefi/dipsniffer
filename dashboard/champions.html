<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧬 Optimization Lab | DipSniffer</title>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --swamp-dark: #0a1a0f;
      --swamp-bg: #0f2417;
      --swamp-card: #132e1b;
      --swamp-border: #1a4025;
      --swamp-highlight: #1f5030;
      --croc-green: #2ecc71;
      --croc-dark-green: #1a9c54;
      --croc-glow: #00ff6a;
      --water-blue: #1a6b5a;
      --danger-red: #e74c3c;
      --warm-gold: #f1c40f;
      --text-primary: #e8f5e9;
      --text-secondary: #81c784;
      --text-muted: #4a7a5a;
      --mono: 'JetBrains Mono', monospace;
      --display: 'Outfit', sans-serif;
    }

    body {
      background: var(--swamp-dark);
      color: var(--text-primary);
      font-family: var(--display);
      min-height: 100vh;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(46, 204, 113, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(26, 107, 90, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(15, 36, 23, 0.8) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #bb86fc, #d5a1ff, var(--water-blue));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .subtitle a {
      color: var(--croc-glow);
      text-decoration: none;
      font-weight: bold;
      margin-right: 15px;
    }

    .subtitle a:hover {
      text-decoration: underline;
    }

    .disclaimer {
      background: rgba(241, 196, 15, 0.1);
      border: 1px solid var(--warm-gold);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--warm-gold);
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 20px;
    }

    .champ-card {
      background: var(--swamp-card);
      border: 1px solid var(--swamp-border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
    }

    .champ-card:hover {
      border-color: #bb86fc;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .champ-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--swamp-border);
    }

    .champ-title {
      font-size: 1.1rem;
      font-weight: 700;
      font-family: var(--mono);
      color: #d5a1ff;
    }

    .champ-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .metric-box {
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }

    .metric-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: var(--mono);
      margin-bottom: 4px;
    }

    .metric-val {
      font-size: 1.2rem;
      font-family: var(--mono);
      font-weight: 700;
    }

    .metric-delta {
      font-size: 0.75rem;
      font-family: var(--mono);
    }

    .positive {
      color: var(--croc-green);
    }

    .negative {
      color: var(--danger-red);
    }

    .mutations-list {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 12px;
      font-family: var(--mono);
      font-size: 0.8rem;
    }

    .mutations-list h4 {
      color: var(--text-secondary);
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .mutation-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
      padding-bottom: 4px;
    }

    .mutation-row:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .mut-key {
      color: var(--text-primary);
    }

    .mut-val {
      color: var(--warm-gold);
      font-weight: bold;
    }

    .no-data {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--text-muted);
      font-family: var(--mono);
      padding: 40px;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="header">
      <h1>🧬 Optimization Lab</h1>
      <div class="subtitle">
        <a href="index.html">⬅ Live Swamps</a> |
        LLM Variant Backtesting Arena
      </div>
    </div>

    <div class="disclaimer">
      ⚠️ <b>RESEARCH ONLY</b>: These configurations were derived via CCXT deterministic simulation. Baseline parameters
      bypass Gemini Layer 3 & Fear API boundaries. Do not deploy these un-audited.
    </div>

    <div class="grid" id="champGrid">
      <div class="no-data">Searching for lab results...</div>
    </div>
  </div>

  <script>
    function formatDelta(val) {
      if (val > 0) return `<span class="positive">▲ +${val.toFixed(2)}%</span>`;
      if (val < 0) return `<span class="negative">▼ ${val.toFixed(2)}%</span>`;
      return `<span style="color:var(--text-muted)">- 0.00%</span>`;
    }

    function formatVal(val) {
      if (val > 0) return `<span class="positive">+${val.toFixed(2)}%</span>`;
      if (val < 0) return `<span class="negative">${val.toFixed(2)}%</span>`;
      return `<span style="color:var(--text-primary)">0.00%</span>`;
    }

    async function loadChampions() {
      try {
        const res = await fetch('lab_data.json?t=' + Date.now());
        if (!res.ok) throw new Error("No data");
        const list = await res.json();

        const grid = document.getElementById('champGrid');

        if (!list || list.length === 0) {
          grid.innerHTML = '<div class="no-data">No champions discovered yet. Run auto_quant.py to start exploring parameter mutations!</div>';
          return;
        }

        list.reverse(); // Newest first

        grid.innerHTML = list.map(c => {
          const mutRows = Object.entries(c.mutations).map(([k, v]) =>
            `<div class="mutation-row"><span class="mut-key">${k}</span><span class="mut-val">${v}</span></div>`
          ).join('');

          return `
          <div class="champ-card">
            <div class="champ-header">
              <div class="champ-title">CHAMPION-VAR</div>
              <div class="champ-date">${new Date(c.timestamp).toLocaleString()}<br>OOS: ${c.start_date || 'INF'} to ${c.end_date || 'NOW'}</div>
            </div>
            
            <div class="metrics-grid">
              <div class="metric-box">
                <div class="metric-label">Net PnL</div>
                <div class="metric-val">${formatVal(c.new_pnl)}</div>
                <div class="metric-delta">vs Base: ${formatDelta(c.delta_pnl)}</div>
              </div>
              <div class="metric-box">
                <div class="metric-label">Max Drawdown</div>
                <div class="metric-val" style="color:var(--text-primary)">${c.new_dd.toFixed(2)}%</div>
                <div class="metric-delta">vs Base: ${formatDelta(c.delta_dd)}</div>
              </div>
            </div>
            
            <div class="mutations-list">
              <h4>Applied Mutations</h4>
              ${mutRows}
            </div>
          </div>
        `;
        }).join('');
      } catch (e) {
        document.getElementById('champGrid').innerHTML = '<div class="no-data">Could not read <code>lab_data.json</code>. Ensure <code>auto_quant.py</code> has successfully generated a champion.</div>';
      }
    }

    loadChampions();
    // setInterval(loadChampions, 10000);
  </script>

</body>

</html>
